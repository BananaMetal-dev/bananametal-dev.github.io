<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ページが見つかりません。トップページ、Apps、Musicへの導線を表示します。" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>ページが見つかりません | Banana Metal</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        color: #201815;
        background: #f6efe5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(238, 174, 82, 0.38), transparent 34rem),
          linear-gradient(135deg, #fff8ef 0%, #f3e7d8 48%, #efe2d2 100%);
      }

      main {
        width: min(640px, 100%);
        border: 1px solid rgba(32, 24, 21, 0.14);
        border-radius: 28px;
        background: #fffaf2;
        padding: clamp(28px, 7vw, 56px);
        box-shadow: 0 24px 80px rgba(50, 32, 18, 0.12);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 4rem;
        line-height: 0.95;
      }

      p {
        margin: 0 0 28px;
        line-height: 1.8;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      a {
        color: #201815;
        border: 1px solid rgba(32, 24, 21, 0.18);
        border-radius: 999px;
        padding: 12px 18px;
        text-decoration: none;
        background: #ffffff;
      }

      a:focus-visible {
        outline: 3px solid #201815;
        outline-offset: 4px;
      }

      @media (max-width: 420px) {
        body {
          padding: 12px;
        }

        h1 {
          font-size: 3rem;
        }

        nav,
        a {
          width: 100%;
        }

        a {
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ページが見つかりません</h1>
      <p>ページが見つかりません。</p>
      <nav aria-label="主要ページ">
        <a href="/">トップページへ戻る</a>
        <a href="/apps/">Appsを見る</a>
        <a href="/music/">Musicを見る</a>
      </nav>
    </main>
  </body>
</html>
